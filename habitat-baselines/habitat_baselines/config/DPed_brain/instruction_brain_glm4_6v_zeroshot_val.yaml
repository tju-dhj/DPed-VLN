# @package _global_
# ==============================================================================
# 文件: instruction_brain_glm4_6v_zeroshot_val.yaml
# 描述: GLM-4.6V Zero-Shot 评估配置
# ==============================================================================

defaults:
  - /benchmark/nav/socialnav_v2: falcon_hm3d_task
  - /habitat_baselines: habitat_baselines_rl_config_base
  - /habitat/simulator/sim_sensors@habitat_baselines.eval.extra_sim_sensors.third_rgb_sensor: third_rgb_sensor
  - /habitat_baselines/rl/policy@habitat_baselines.rl.policy.agent_1: single_fixed
  - /habitat_baselines/rl/policy@habitat_baselines.rl.policy.agent_2: single_fixed
  - /habitat_baselines/rl/policy@habitat_baselines.rl.policy.agent_3: single_fixed
  - /habitat_baselines/rl/policy@habitat_baselines.rl.policy.agent_4: single_fixed
  - /habitat_baselines/rl/policy@habitat_baselines.rl.policy.agent_5: single_fixed
  - /habitat_baselines/rl/policy@habitat_baselines.rl.policy.agent_6: single_fixed
  - /habitat/task/actions@habitat.task.actions.agent_0_discrete_stop: discrete_stop
  - /habitat/task/actions@habitat.task.actions.agent_0_discrete_move_forward: discrete_move_forward
  - /habitat/task/actions@habitat.task.actions.agent_0_discrete_turn_left: discrete_turn_left
  - /habitat/task/actions@habitat/task.actions.agent_0_discrete_turn_right: discrete_turn_right
  - /habitat/task/actions@habitat.task.actions.agent_1_oracle_nav_randcoord_action_obstacle: oracle_nav_action
  - /habitat/task/actions@habitat.task.actions.agent_2_oracle_nav_randcoord_action_obstacle: oracle_nav_action
  - /habitat/task/actions@habitat/task.actions.agent_3_oracle_nav_randcoord_action_obstacle: oracle_nav_action
  - /habitat/task/actions@habitat/task/actions.agent_4_oracle_nav_randcoord_action_obstacle: oracle_nav_action
  - /habitat/task/actions@habitat/task/actions.agent_5_oracle_nav_randcoord_action_obstacle: oracle_nav_action
  - /habitat/task/actions@habitat/task/actions.agent_6_oracle_nav_randcoord_action_obstacle: oracle_nav_action
  - /habitat/task/lab_sensors@habitat.task.lab_sensors.agent_0_pointgoal_with_gps_compass: pointgoal_with_gps_compass_sensor
  - _self_

habitat:
  dataset:
    type: "DynamicVLNCE-v1"
    split: val
    data_path: "/share/home/u19666033/dhj/Falcon-main/data/dynamic_dataset_final_v2/val_full/{scene}.json.gz"
    scenes_dir: "/share/home/u19666033/dhj/Falcon-main/data/scene_datasets/hm3d"
    content_scenes: ["*"]

  environment:
    iterator_options:
      shuffle: False

  simulator:
    habitat_sim_v0:
      gpu_device_id: 0
      allow_sliding: True
      enable_physics: True

  gym:
    obs_keys:
      - agent_0_articulated_agent_jaw_rgb
      - agent_0_articulated_agent_jaw_depth
      - agent_0_overhead_front_rgb
      - agent_0_overhead_front_depth
      - agent_0_third_rgb
      - agent_0_third_depth
      - agent_0_pointgoal_with_gps_compass
      - agent_0_localization_sensor
      - agent_0_human_num_sensor
      - agent_0_oracle_humanoid_future_trajectory
      - agent_0_falcon_instruction
      - agent_0_falcon_gt_action

  task:
    actions:
      agent_0_discrete_stop:
        lin_speed: 0.0
        ang_speed: 0.0
      agent_0_discrete_move_forward:
        lin_speed: 25.0
        ang_speed: 0.0
        allow_dyn_slide: True
      agent_0_discrete_turn_left:
        lin_speed: 0.0
        ang_speed: 10.0
        allow_dyn_slide: True
      agent_0_discrete_turn_right:
        lin_speed: 0.0
        ang_speed: -10.0
        allow_dyn_slide: True
      agent_1_oracle_nav_randcoord_action_obstacle:
        type: OracleNavRandCoordAction_Obstacle
        motion_control: human_joints
        lin_speed: 10.0
        ang_speed: 10.0
        allow_dyn_slide: True
      agent_2_oracle_nav_randcoord_action_obstacle:
        type: OracleNavRandCoordAction_Obstacle
        motion_control: human_joints
        lin_speed: 10.0
        ang_speed: 10.0
        allow_dyn_slide: True
      agent_3_oracle_nav_randcoord_action_obstacle:
        type: OracleNavRandCoordAction_Obstacle
        motion_control: human_joints
        lin_speed: 10.0
        ang_speed: 10.0
        allow_dyn_slide: True
      agent_4_oracle_nav_randcoord_action_obstacle:
        type: OracleNavRandCoordAction_Obstacle
        motion_control: human_joints
        lin_speed: 10.0
        ang_speed: 10.0
        allow_dyn_slide: True
      agent_5_oracle_nav_randcoord_action_obstacle:
        type: OracleNavRandCoordAction_Obstacle
        motion_control: human_joints
        lin_speed: 10.0
        ang_speed: 10.0
        allow_dyn_slide: True
      agent_6_oracle_nav_randcoord_action_obstacle:
        type: OracleNavRandCoordAction_Obstacle
        motion_control: human_joints
        lin_speed: 10.0
        ang_speed: 10.0
        allow_dyn_slide: True

habitat_baselines:
  evaluate: True
  verbose: True
  torch_gpu_id: 0
  tensorboard_dir: "evaluation_vln_val/zeroshot_glm4_6v_rl37/hm3d/tb"
  video_dir: "evaluation_vln_val/zeroshot_glm4_6v_rl37/video"
  eval_ckpt_path_dir: "/share/home/u19666033/dhj/DPed_pro/evaluation-vln/dynamic_vlnce_clip_rl_v2_ddppo/hm3d/checkpoints_vln_new/ckpt.37.pth"
  test_episode_count: -1
  num_environments: 1
  checkpoint_folder: "/share/home/u19666033/dhj/DPed_pro/evaluation_vln_val/zeroshot_glm4_6v_rl37/ckpt"

  num_updates: -1
  total_num_steps: 1e8
  log_interval: 10
  num_checkpoints: 200
  force_torch_single_threaded: True
  num_processes: 1
  load_resume_state_config: False

  trainer_name: "instruction_brain_ppo_trainer"

  evaluator:
    _target_: habitat_baselines.rl.ppo.instruction_brain_ppo_evaluator.InstructionBrainPPOEvaluator

  # Brain模块配置
  brain:
    enabled: true
    instruction_mode: true
    max_history_frames: 5
    
    # ========== 行人检测配置（YOLOv8n） ==========
    pedestrian_enabled: true
    pedestrian_detector: "yolov8n"
    pedestrian_confidence: 0.25
    pedestrian_ckpt_path: "/share/home/u19666033/dhj/DPed_pro/pretrained_model/yolov8n-seg.pt"
    
    # ========== Brain模型配置（GLM-4.6V） ==========
    model_type: "glm_4_6v"
    model_id: "THUDM/GLM-4V-9B"
    model_path: "/share/home/u19666033/dhj/DPed_pro/pretrained_model/GLM-4V-9B"
    brain_device: "cuda"
    
    # 推理配置
    max_new_tokens: 256
    temperature: 0.7
    top_p: 0.9
    enable_reasoning: true
    
    # 冻结配置
    freeze_brain: true
    freeze_pedestrian: true
    freeze_clip: true
    
    # 决策逻辑配置
    call_brain_only_when_pedestrian: true
    brain_call_confidence: 0.70
    
    # 历史信息配置
    use_history_for_brain: true
    max_history_length: 5
    
    # 记录配置
    save_frame_records: true
    output_dir: "/share/home/u19666033/dhj/DPed_pro/brain_records_zeroshot_glm4_6v_rl37"
    log_pedestrian_stats: true
    log_brain_call_stats: true
    
    # Prompt打印配置
    log_prompt: false
    save_prompt_to_file: true
    save_frame_images: true
    frame_images_root: "/share/home/u19666033/dhj/DPed_pro/brain_records_zeroshot_glm4_6v_rl37/frame_images"

  eval:
    use_ckpt_config: False
    should_load_ckpt: True
    video_option: ["disk"]

  rl:
    agent:
      type: "MultiAgentAccessMgr"
      num_agent_types: 7
      num_active_agents_per_type: [1, 1, 1, 1, 1, 1, 1]
      num_pool_agents_per_type: [1, 1, 1, 1, 1, 1, 1]
      agent_sample_interval: 20
      force_partner_sample_idx: -1

    policy:
      agent_0:
        name: "PointNavResNetPolicy"

    ppo:
      clip_param: 0.2
      ppo_epoch: 2
      num_mini_batch: 1
      value_loss_coef: 0.5
      entropy_coef: 0.01
      lr: 1e-4
      eps: 1e-5
      max_grad_norm: 0.5
      num_steps: 64
      use_gae: True
      gamma: 0.99
      tau: 0.95
      use_linear_clip_decay: False
      use_linear_lr_decay: True
      reward_window_size: 50
      use_normalized_advantage: False
      hidden_size: 512
      use_double_buffered_sampler: False

    ddppo:
      force_distributed: False
      sync_frac: 0.6
      distrib_backend: NCCL
      pretrained_weights: /share/home/u19666033/dhj/DPed_pro/pretrained_model/falcon_noaux_25.pth
      pretrained: False
      pretrained_encoder: False
      train_encoder: False
      reset_critic: True
      backbone: resnet50_clip_attnpool
      rnn_type: LSTM
      num_recurrent_layers: 2

hydra:
  job:
    name: "instruction_brain_glm4_6v_zeroshot_val"
  run:
    dir: "outputs/instruction_brain_glm4_6v_zeroshot_val/${now:%Y-%m-%d_%H-%M-%S}"
