habitat_baselines:
  evaluate: True
  verbose: True
  trainer_name: "ddppo"
  torch_gpu_id: 0
  tensorboard_dir: "evaluation-vln-dpedpro2/streamvln_zero_shot_static_v2_test_unseen/hm3d/tb"
  test_episode_count: -1
  eval_ckpt_path_dir: "pretrained_model/StreamVLN_Video_qwen_1_5_r2r_rxr_envdrop_scalevln"
  num_environments: 1
  checkpoint_folder: "evaluation-vln-dpedpro2/streamvln_zero_shot_static_v2_test_unseen/hm3d/checkpoints"
  num_updates: -1
  total_num_steps: 1e8
  log_interval: 10
  num_checkpoints: 200
  force_torch_single_threaded: True
  load_resume_state_config: False

  evaluator:
    _target_: habitat_baselines.rl.ppo.streamvln_evaluator.StreamVLNEvaluator

  eval:
    use_ckpt_config: False
    should_load_ckpt: False
    max_steps_per_episode: 500

  rl:
    agent:
      type: "MultiAgentAccessMgr"
      num_agent_types: 7
      num_active_agents_per_type: [1, 1, 1, 1, 1, 1, 1]
      num_pool_agents_per_type: [1, 1, 1, 1, 1, 1, 1]
      agent_sample_interval: 20
      force_partner_sample_idx: -1
    policy:
      agent_0:
        name: "StreamVLNPolicy"
        model_path: "pretrained_model/StreamVLN_Video_qwen_1_5_r2r_rxr_envdrop_scalevln"
        num_frames: 32
        num_history: 8
        num_future_steps: 4
        model_max_length: 4096
        max_new_tokens: 512
        device: "cuda"
        action_distribution_type: "categorical"
    ppo:
      clip_param: 0.2
      ppo_epoch: 2
      num_mini_batch: 2
      value_loss_coef: 0.5
      entropy_coef: 0.01
      lr: 2.5e-4
      eps: 1e-5
      max_grad_norm: 0.2
      num_steps: 128
      use_gae: True
      gamma: 0.99
      tau: 0.95
      use_linear_clip_decay: False
      use_linear_lr_decay: False
      reward_window_size: 50
      use_normalized_advantage: False
      hidden_size: 1024
      use_double_buffered_sampler: False

    ddppo:
      sync_frac: 0.6
      distrib_backend: NCCL
      force_distributed: False
      pretrained: False
      pretrained_encoder: False
      train_encoder: False
      reset_critic: True
      backbone: "streamvln"
      rnn_type: "GRU"
      num_recurrent_layers: 1
