habitat_baselines:
  evaluate: True
  verbose: True
  trainer_name: "direct_il"
  torch_gpu_id: 0
  tensorboard_dir: "evaluation-vln-dpedpro2/navid_zero_shot_static_v1_test_unseen/hm3d/tb"
  test_episode_count: -1
  eval_ckpt_path_dir: "pretrained_model/navid_checkpoint"
  num_environments: 1
  checkpoint_folder: "evaluation-vln-dpedpro2/navid_zero_shot_static_v1_test_unseen/hm3d/checkpoints"
  num_updates: -1
  total_num_steps: 1e8
  log_interval: 10
  num_checkpoints: 200
  force_torch_single_threaded: True
  load_resume_state_config: False

  evaluator:
    _target_: habitat_baselines.rl.ppo.navid_evaluator.NaVidEvaluator

  eval:
    use_ckpt_config: False
    should_load_ckpt: False
    max_steps_per_episode: 500

  rl:
    agent:
      type: "MultiAgentAccessMgr"
      num_agent_types: 7
      num_active_agents_per_type: [1, 1, 1, 1, 1, 1, 1]
      num_pool_agents_per_type: [1, 1, 1, 1, 1, 1, 1]
      agent_sample_interval: 20
      force_partner_sample_idx: -1  il:
    epochs: 1
    batch_size: 1
    use_iw: True
    inflection_weight_coef: 3.0
    dataloader_num_workers: 0
    pin_memory: False
    distributed:
      enabled: False
    eval_save_results: True
    log_metrics: True
    output_log_dir: "evaluation-vln-dpedpro2/navid_zero_shot_static_v1_test_unseen/hm3d/logs"
    results_dir: "evaluation-vln-dpedpro2/navid_zero_shot_static_v1_test_unseen/hm3d/logs/results/{split}"
    save_resume_state_interval: 100
    save_state_batch_only: False
    policy:
      agent_0:
        name: "NaVidPolicy"
        action_distribution_type: "categorical"
        model_path: "pretrained_model/navid_checkpoint"

    model:
      hidden_size: 512
      backbone: "resnet50"
      rnn_type: "LSTM"
      num_recurrent_layers: 2
      use_text_instruction: True
      text_encoder_dim: 2048
      fusion_method: attention
      use_lora: False
      pretrained: False
      pretrained_encoder: False
      train_encoder: False

    optim:
      lr: 2e-4
      eps: 1e-5
      max_grad_norm: 0.5

    direct_il:
      dataset_type: "json"
      data_root: "/share/home/u19666033/dhj/dped-vln/DPed_VLN/data_sets/v1/test_unseen"
      rgb_data_roots:
        - "/share/home/u19666033/dhj/dped-vln/data/collect_data/val"
        - "/share/home/u19666033/dhj/DPed_pro/data/collect_data/val"
      max_episodes: -1
      max_episode_length: 500
      window_size: 0
      instruction_priority:
        - instruction_vl_level_1
    ppo:
      clip_param: 0.2
      ppo_epoch: 2
      num_mini_batch: 2
      value_loss_coef: 0.5
      entropy_coef: 0.01
      lr: 2.5e-4
      eps: 1e-5
      max_grad_norm: 0.2
      num_steps: 128
      use_gae: True
      gamma: 0.99
      tau: 0.95
      use_linear_clip_decay: False
      use_linear_lr_decay: False
      reward_window_size: 50
      use_normalized_advantage: False
      hidden_size: 1024
      use_double_buffered_sampler: False

    ddppo:
      sync_frac: 0.6
      distrib_backend: NCCL
      force_distributed: False
      pretrained: False
      pretrained_encoder: False
      train_encoder: False
      reset_critic: True
      backbone: "streamvln"
      rnn_type: "GRU"
      num_recurrent_layers: 1
