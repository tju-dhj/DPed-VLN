# @package _global_

defaults:
  - /benchmark/nav/socialnav_v2: falcon_hm3d_task_for_train
  - /habitat_baselines: habitat_baselines_rl_config_base
  - /habitat/simulator/sim_sensors@habitat_baselines.eval.extra_sim_sensors.third_rgb_sensor: third_rgb_sensor 
  - /habitat_baselines/rl/policy@habitat_baselines.rl.policy.agent_1: single_fixed
  - /habitat_baselines/rl/policy@habitat_baselines.rl.policy.agent_2: single_fixed
  - /habitat_baselines/rl/policy@habitat_baselines.rl.policy.agent_3: single_fixed
  - /habitat_baselines/rl/policy@habitat_baselines.rl.policy.agent_4: single_fixed
  - /habitat_baselines/rl/policy@habitat_baselines.rl.policy.agent_5: single_fixed
  - /habitat_baselines/rl/policy@habitat_baselines.rl.policy.agent_6: single_fixed
  - /habitat/task/actions@habitat.task.actions.agent_0_discrete_stop: discrete_stop
  - /habitat/task/actions@habitat.task.actions.agent_0_discrete_move_forward: discrete_move_forward
  - /habitat/task/actions@habitat.task.actions.agent_0_discrete_turn_left: discrete_turn_left
  - /habitat/task/actions@habitat.task.actions.agent_0_discrete_turn_right: discrete_turn_right
  - /habitat/task/actions@habitat.task.actions.agent_1_oracle_nav_randcoord_action_obstacle: oracle_nav_action 
  - /habitat/task/actions@habitat.task.actions.agent_2_oracle_nav_randcoord_action_obstacle: oracle_nav_action 
  - /habitat/task/actions@habitat.task.actions.agent_3_oracle_nav_randcoord_action_obstacle: oracle_nav_action 
  - /habitat/task/actions@habitat.task.actions.agent_4_oracle_nav_randcoord_action_obstacle: oracle_nav_action 
  - /habitat/task/actions@habitat.task.actions.agent_5_oracle_nav_randcoord_action_obstacle: oracle_nav_action 
  - /habitat/task/actions@habitat.task.actions.agent_6_oracle_nav_randcoord_action_obstacle: oracle_nav_action 
  - /habitat/task/lab_sensors@habitat.task.lab_sensors.agent_0_pointgoal_with_gps_compass: pointgoal_with_gps_compass_sensor
  - _self_

habitat:
  environment:
    max_episode_steps: 500  
  dataset:
    type: "DynamicVLNCE-v1"
    split: val
    data_path: "/share/home/u19666033/dhj/DPed_pro/data/DPed_pro/val/{scene}.json.gz"
    scenes_dir: "/share/home/u19666033/dhj/DPed_pro/data/scene_datasets/hm3d"
    content_scenes: ["*"]
  simulator:
    habitat_sim_v0:
      gpu_device_id: 0
      allow_sliding: True
      enable_physics: True
  gym:
    obs_keys: 
      # - agent_0_articulated_agent_jaw_rgb # use it if add RGB camera
      # - agent_0_articulated_agent_jaw_depth
      - agent_0_overhead_front_rgb
      - agent_0_overhead_front_depth
      # - agent_0_third_rgb
      # - agent_0_third_depth
      - agent_0_starting_point_gps_compass
      - agent_0_localization_sensor
      - agent_0_human_num_sensor  
      - agent_0_oracle_humanoid_future_trajectory
      - agent_0_falcon_instruction  # VLN instruction sensor
      - agent_0_falcon_gt_action    # VLN GT action sensor
  task:
    measurements:
      success:
        type: Success
        success_distance: 3.0  # 在这里覆盖默认值 0.25
    actions:
      agent_0_discrete_stop:
        lin_speed: 0.0 
        ang_speed: 0.0
      agent_0_discrete_move_forward:
        lin_speed: 30.0
        ang_speed: 0.0
        allow_dyn_slide: True
      agent_0_discrete_turn_left:
        lin_speed: 0.0
        ang_speed: 31.415926535897
        allow_dyn_slide: True
      agent_0_discrete_turn_right:
        lin_speed: 0.0
        ang_speed: -31.415926535897
        allow_dyn_slide: True
      agent_1_oracle_nav_randcoord_action_obstacle:
        type: OracleNavRandCoordAction_Obstacle 
        motion_control: human_joints
        lin_speed: 10.0
        ang_speed: 10.0
        allow_dyn_slide: True
      agent_2_oracle_nav_randcoord_action_obstacle:
        type: OracleNavRandCoordAction_Obstacle 
        motion_control: human_joints
        lin_speed: 10.0
        ang_speed: 10.0
        allow_dyn_slide: True
      agent_3_oracle_nav_randcoord_action_obstacle:
        type: OracleNavRandCoordAction_Obstacle 
        motion_control: human_joints
        lin_speed: 10.0
        ang_speed: 10.0
        allow_dyn_slide: True
      agent_4_oracle_nav_randcoord_action_obstacle:
        type: OracleNavRandCoordAction_Obstacle 
        motion_control: human_joints
        lin_speed: 10.0
        ang_speed: 10.0
        allow_dyn_slide: True
      agent_5_oracle_nav_randcoord_action_obstacle:
        type: OracleNavRandCoordAction_Obstacle 
        motion_control: human_joints
        lin_speed: 10.0
        ang_speed: 10.0
        allow_dyn_slide: True
      agent_6_oracle_nav_randcoord_action_obstacle:
        type: OracleNavRandCoordAction_Obstacle 
        motion_control: human_joints
        lin_speed: 10.0
        ang_speed: 10.0
        allow_dyn_slide: True
habitat_baselines:
  evaluate: True # True
  verbose: True
  trainer_name: "dynamic_vln_trainer" ## Use Falcon trainer for testing
  torch_gpu_id: 0
  tensorboard_dir: "evaluation-vlnce-eval/dynamic_vlnce_clip_rl_v1/hm3d/tb"
  # video_dir: "evaluation-vln/dynamic_vlnce_clip_rl_v1/hm3d/video"
  test_episode_count: -1
  # 指向你的6动作训练模型检查点
  eval_ckpt_path_dir: "/share/home/u19666033/dhj/DPed_pro/evaluation-vlnce/dped/dped_train_v1_gps_starting_point/hm3d/checkpoints/ckpt.15.pth"
  num_environments: 1  # 从4减少到2以避免OOM（内存溢出）
  checkpoint_folder: "evaluation-vlnce-eval/dynamic_vlnce_clip_rl_v1/hm3d/checkpoints" # save_dir for training
  # 注意：训练器会自动从checkpoint_folder中查找以下文件来恢复训练（按优先级）：
  # 1. .habitat-resume-state.pth (包含完整的训练状态，包括优化器、学习率调度器等)
  # 2. latest.pth (最新的checkpoint)
  # 3. 最新的ckpt.X.pth (按编号最大的)
  num_updates: -1
  total_num_steps: 50000000 # 缩短训练时间：从10M减少到2M步（约5倍加速）
  # 注意：如果从checkpoint恢复，训练会从上次中断的地方继续，total_num_steps是总目标步数
  log_interval: 10
  num_checkpoints: -1  # 改为-1，使用checkpoint_interval控制保存频率，避免内存问题
  checkpoint_interval: 100  # 每50个update保存一次checkpoint，防止OOM导致进度丢失
  # Force PyTorch to be single threaded as
  # this improves performance considerably
  force_torch_single_threaded: True
  # Disable multiprocessing for stability
  num_processes: 1
  load_resume_state_config: False # 允许从checkpoint恢复训练
  # 训练器会自动从checkpoint_folder中查找latest.pth或.habitat-resume-state.pth来恢复训练
  # 如果找不到，会从最新的ckpt.X.pth恢复

  evaluator:
    _target_: habitat_baselines.rl.ppo.falcon_evaluator.FALCONEvaluator

  eval:
    use_ckpt_config: False 
    should_load_ckpt: True

  rl:
    agent:
      type: "MultiAgentAccessMgr"
      num_agent_types: 7
      num_active_agents_per_type: [1, 1, 1, 1, 1, 1, 1]
      num_pool_agents_per_type: [1, 1, 1, 1, 1, 1, 1]
      agent_sample_interval: 20 
      force_partner_sample_idx: -1
    policy:
      agent_0:
        name: "PointNavResNetPolicy"  # Use original policy for testing with Falcon trainer
    ppo:
      # ppo params
      clip_param: 0.2
      ppo_epoch: 1  # 减少PPO更新轮数以降低内存和加速训练
      num_mini_batch: 1  # Must be <= num_environments (1)
      value_loss_coef: 0.5
      entropy_coef: 0.01
      lr: 1e-4  # Reduced learning rate for VLN
      eps: 1e-5
      max_grad_norm: 0.5  # Increased for VLN stability
      num_steps: 64
      use_gae: True
      gamma: 0.99
      tau: 0.95
      use_linear_clip_decay: False
      use_linear_lr_decay: True  # Enable for VLN
      reward_window_size: 50

      use_normalized_advantage: False

      hidden_size: 512

      # Use double buffered sampling, typically helps
      # when environment time is similar or larger than
      # policy inference time during rollout generation
      use_double_buffered_sampler: False
    ddppo:
      force_distributed: False  # 明确禁用分布式模式用于评估
      sync_frac: 0.6
      distrib_backend: NCCL
      pretrained_weights: pretrained_model/falcon_noaux_25.pth
      pretrained: False
      pretrained_encoder: False
      train_encoder: False
      reset_critic: True
      backbone: resnet50_clip_attnpool
      rnn_type: LSTM
      num_recurrent_layers: 2
      clip_visual_sensors:
        rgb_keys:
          - overhead_front_rgb
        depth_keys:
          - overhead_front_depth
        fusion_mode: "attention"
        normalize_before_fusion: True
      gps_sensor_type: "starting_point"