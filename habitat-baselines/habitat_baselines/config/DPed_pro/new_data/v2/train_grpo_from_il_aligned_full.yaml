# @package _global_

defaults:
  - /benchmark/nav/socialnav_v2: falcon_hm3d_task_for_train
  - /habitat_baselines: habitat_baselines_rl_config_base
  - /habitat/simulator/sim_sensors@habitat_baselines.eval.extra_sim_sensors.third_rgb_sensor: third_rgb_sensor
  - /habitat_baselines/rl/policy@habitat_baselines.rl.policy.agent_1: single_fixed
  - /habitat_baselines/rl/policy@habitat_baselines.rl.policy.agent_2: single_fixed
  - /habitat_baselines/rl/policy@habitat_baselines.rl.policy.agent_3: single_fixed
  - /habitat_baselines/rl/policy@habitat_baselines.rl.policy.agent_4: single_fixed
  - /habitat_baselines/rl/policy@habitat_baselines.rl.policy.agent_5: single_fixed
  - /habitat_baselines/rl/policy@habitat_baselines.rl.policy.agent_6: single_fixed
  - /habitat/task/actions@habitat.task.actions.agent_0_discrete_stop: discrete_stop
  - /habitat/task/actions@habitat.task.actions.agent_0_discrete_move_forward: discrete_move_forward
  - /habitat/task/actions@habitat.task.actions.agent_0_discrete_turn_left: discrete_turn_left
  - /habitat/task/actions@habitat.task.actions.agent_0_discrete_turn_right: discrete_turn_right
  - /habitat/task/actions@habitat.task.actions.agent_1_oracle_nav_randcoord_action_obstacle: oracle_nav_action
  - /habitat/task/actions@habitat.task.actions.agent_2_oracle_nav_randcoord_action_obstacle: oracle_nav_action
  - /habitat/task/actions@habitat.task.actions.agent_3_oracle_nav_randcoord_action_obstacle: oracle_nav_action
  - /habitat/task/actions@habitat.task.actions.agent_4_oracle_nav_randcoord_action_obstacle: oracle_nav_action
  - /habitat/task/actions@habitat.task.actions.agent_5_oracle_nav_randcoord_action_obstacle: oracle_nav_action
  - /habitat/task/actions@habitat.task.actions.agent_6_oracle_nav_randcoord_action_obstacle: oracle_nav_action
  - /habitat/task/lab_sensors@habitat.task.lab_sensors.agent_0_pointgoal_with_gps_compass: pointgoal_with_gps_compass_sensor
  - _self_

habitat:
  environment:
    max_episode_steps: 300
  dataset:
    type: "DynamicVLNCE-v1"
    split: train
    data_path: "/share/home/u19666033/dhj/DPed_pro/dped_pro_resplit/train/{scene}.json.gz"
    scenes_dir: "/share/home/u19666033/dhj/DPed_pro/data/scene_datasets/hm3d"
    content_scenes: ["*"]
  gym:
    obs_keys:
      - agent_0_overhead_front_rgb
      - agent_0_overhead_front_depth
      - agent_0_starting_point_gps_compass
      - agent_0_localization_sensor
      - agent_0_human_num_sensor
      - agent_0_oracle_humanoid_future_trajectory
      - agent_0_falcon_instruction
      - agent_0_falcon_gt_action
  task:
    measurements:
      success:
        type: Success
        success_distance: 1
      multi_agent_nav_reward:
        use_social_eq_reward: true
        disperse_reward_coef: 0.1
        social_efficiency_bonus: 0.02
        detour_reward_coef: 0.05
    actions:
      agent_0_discrete_stop:
        lin_speed: 0.0
        ang_speed: 0.0
      agent_0_discrete_move_forward:
        lin_speed: 30.0
        ang_speed: 0.0
        allow_dyn_slide: True
      agent_0_discrete_turn_left:
        lin_speed: 0.0
        ang_speed: 31.415926535897
        allow_dyn_slide: True
      agent_0_discrete_turn_right:
        lin_speed: 0.0
        ang_speed: -31.415926535897
        allow_dyn_slide: True
      agent_1_oracle_nav_randcoord_action_obstacle:
        type: OracleNavRandCoordAction_Obstacle
        motion_control: human_joints
        lin_speed: 10.0
        ang_speed: 10.0
        allow_dyn_slide: True
      agent_2_oracle_nav_randcoord_action_obstacle:
        type: OracleNavRandCoordAction_Obstacle
        motion_control: human_joints
        lin_speed: 10.0
        ang_speed: 10.0
        allow_dyn_slide: True
      agent_3_oracle_nav_randcoord_action_obstacle:
        type: OracleNavRandCoordAction_Obstacle
        motion_control: human_joints
        lin_speed: 10.0
        ang_speed: 10.0
        allow_dyn_slide: True
      agent_4_oracle_nav_randcoord_action_obstacle:
        type: OracleNavRandCoordAction_Obstacle
        motion_control: human_joints
        lin_speed: 10.0
        ang_speed: 10.0
        allow_dyn_slide: True
      agent_5_oracle_nav_randcoord_action_obstacle:
        type: OracleNavRandCoordAction_Obstacle
        motion_control: human_joints
        lin_speed: 10.0
        ang_speed: 10.0
        allow_dyn_slide: True
      agent_6_oracle_nav_randcoord_action_obstacle:
        type: OracleNavRandCoordAction_Obstacle
        motion_control: human_joints
        lin_speed: 10.0
        ang_speed: 10.0
        allow_dyn_slide: True

habitat_baselines:
  evaluate: False
  verbose: True
  trainer_name: "dynamic_vln_trainer"
  updater_name: "GRPO"
  distrib_updater_name: "DDPGRPO"
  torch_gpu_id: 0
  tensorboard_dir: "evaluation-vlnce-dpedpro/grpo/direct_il_aligned_full/hm3d/tb"
  test_episode_count: -1
  num_environments: 8                       # doubled from 4 for larger batch / more stable GRPO
  checkpoint_folder: "evaluation-vlnce-dpedpro/grpo/direct_il_aligned_full/hm3d/checkpoints"
  num_updates: -1
  total_num_steps: 20000000
  log_interval: 100
  num_checkpoints: -1
  checkpoint_interval: 100
  num_processes: 1                          # deprecated, 实际进程数 = num_environments
  load_resume_state_config: True
  load_from_il_checkpoint: True
  il_checkpoint_path: "/share/home/u19666033/dhj/DPed_pro/evaluation-vlnce-dpedpro/dynamic_vlnce_clip_direct_il_aligned_full/hm3d/checkpoints/ckpt.epoch_6.step_170190.pth"
  log_file: "evaluation-vlnce-dpedpro/grpo/direct_il_aligned_full/hm3d/train.log"

  evaluator:
    _target_: habitat_baselines.rl.ppo.falcon_evaluator.FALCONEvaluator

  eval:
    use_ckpt_config: False
    should_load_ckpt: False

  rl:
    agent:
      type: "MultiAgentAccessMgr"
      num_agent_types: 7
      num_active_agents_per_type: [1, 1, 1, 1, 1, 1, 1]
      num_pool_agents_per_type: [1, 1, 1, 1, 1, 1, 1]
      agent_sample_interval: 20
      force_partner_sample_idx: -1
    policy:
      agent_0:
        name: "PointNavResNetPolicy"
    ppo:
      clip_param: 0.15                       # reduced from 0.2 for gentler updates
      ppo_epoch: 2                            # INCREASED: more passes through data per update (was 1)
      num_mini_batch: 2                       # DECREASED: larger per-GPU batch = better utilization (was 4)
      value_loss_coef: 0.1                    # small value loss for stable GAE fallback
      entropy_coef: 0.05                      # INCREASED: stronger entropy bonus to prevent collapse (was 0.02)
      lr: 2.5e-5                              # REDUCED: compensate for more epochs (was 1e-4)
      eps: 1e-5
      max_grad_norm: 0.3                      # tighter gradient clipping
      num_steps: 128                          # INCREASED: more episodes per rollout → better GRPO groups (was 96)
      use_gae: True
      gamma: 0.99
      tau: 0.95
      use_linear_clip_decay: False
      use_linear_lr_decay: True
      reward_window_size: 100
      use_normalized_advantage: False
      hidden_size: 512                        # keep 512 — increase to 768 if GPU memory still under 60%
      use_double_buffered_sampler: False
      # --- GRPO core settings ---
      grpo_group_size: 8                      # INCREASED: more episodes per group → stable normalization (was 6)
      grpo_min_group_size: 4                  # INCREASED: prevent binary ±1 advantages from tiny groups (was 2)
      grpo_group_key: "instruction"
      grpo_reward_aggregation: "mean"
      grpo_advantage_eps: 0.001
      grpo_normalize_std: True
      grpo_fallback_to_gae: True
      grpo_use_batch_fallback: True
      grpo_use_value_critic: False
      # --- KL regularization with annealing ---
      # Start strong to anchor IL behavior, then gradually release.
      grpo_ref_kl_coef: 0.3                   # INCREASED: stronger KL anchor (was 0.05)
      grpo_ref_kl_anneal_start: 0.5           # Start: very strong IL anchoring
      grpo_ref_kl_anneal_end: 0.05            # End: minimal KL penalty after policy stabilizes
      grpo_ref_kl_anneal_steps: 3000          # Anneal over ~3000 updates
      # --- Advantage clipping ---
      grpo_advantage_clip: 3.0                # REDUCED: tighter clip to prevent extreme gradients (was 5.0)
      # --- Adaptive global-norm-weight ---
      grpo_adaptive_global_norm: True         # NEW: reduce global bias when groups are large enough
      grpo_global_norm_weight: 0.2            # REDUCED: less global mixing, trust group-local more (was 0.3)
      grpo_global_norm_weight_min: 0.05       # Minimum global weight when groups are well-populated
      # --- Entropy anti-collapse ---
      grpo_entropy_min_threshold: 0.02        # NEW: warn if policy entropy drops below this
      grpo_entropy_collapse_action: "warn"    # Log warning when entropy collapses
      # --- Small-group advantage scaling ---
      grpo_scale_adv_by_group_size: True      # NEW: down-weight advantages from tiny groups

    ddppo:
      sync_frac: 0.6
      distrib_backend: NCCL
      pretrained_weights: /share/home/u19666033/dhj/DPed_pro/pretrained_model/falcon_pretrained_25.pth
      pretrained: True
      pretrained_encoder: False
      train_encoder: False
      reset_critic: True
      backbone: resnet50_clip_attnpool
      rnn_type: LSTM
      num_recurrent_layers: 2
      clip_visual_sensors:
        rgb_keys:
          - overhead_front_rgb
        depth_keys:
          - overhead_front_depth
        fusion_mode: "attention"
        normalize_before_fusion: True
      gps_sensor_type: "starting_point"

    auxiliary_losses:
      people_counting:
        max_human_num: 6
        loss_scale: 0.1
      guess_human_position:
        max_human_num: 6
        position_dim: 2
        loss_scale: 0.1
      future_trajectory_prediction:
        max_human_num: 6
        future_step: 4
        loss_scale: 0.1
