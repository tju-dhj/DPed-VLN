# @package _global_
# 第一阶段：初始IL训练配置文件
# 从30k池中随机均匀采样10,000个episodes，训练初始策略π₀
# 关键说明：
# 1. 这是初始IL训练阶段，使用专家数据训练初始策略
# 2. 策略配置在 habitat_baselines.il 下，只需要策略网络（actor部分）
# 3. 网络架构参数（backbone、text_instruction等）需要在IL配置中指定

defaults:
  - /benchmark/nav/socialnav_v2: falcon_hm3d_task_for_train_vln
  - /habitat_baselines: habitat_baselines_il_config_base  # 使用IL配置基类，而不是RL配置
  - /habitat/simulator/sim_sensors@habitat_baselines.eval.extra_sim_sensors.third_rgb_sensor: third_rgb_sensor 
  - /habitat_baselines/il/policy@habitat_baselines.il.policy.agent_1: single_fixed
  - /habitat_baselines/il/policy@habitat_baselines.il.policy.agent_2: single_fixed
  - /habitat_baselines/il/policy@habitat_baselines.il.policy.agent_3: single_fixed
  - /habitat_baselines/il/policy@habitat_baselines.il.policy.agent_4: single_fixed
  - /habitat_baselines/il/policy@habitat_baselines.il.policy.agent_5: single_fixed
  - /habitat_baselines/il/policy@habitat_baselines.il.policy.agent_6: single_fixed
  - /habitat/task/actions@habitat.task.actions.agent_0_discrete_stop: discrete_stop
  - /habitat/task/actions@habitat.task.actions.agent_0_discrete_move_forward: discrete_move_forward
  - /habitat/task/actions@habitat.task.actions.agent_0_discrete_turn_left: discrete_turn_left
  - /habitat/task/actions@habitat.task.actions.agent_0_discrete_turn_right: discrete_turn_right
  - /habitat/task/actions@habitat.task.actions.agent_1_oracle_nav_randcoord_action_obstacle: oracle_nav_action 
  - /habitat/task/actions@habitat.task.actions.agent_2_oracle_nav_randcoord_action_obstacle: oracle_nav_action 
  - /habitat/task/actions@habitat.task.actions.agent_3_oracle_nav_randcoord_action_obstacle: oracle_nav_action 
  - /habitat/task/actions@habitat.task.actions.agent_4_oracle_nav_randcoord_action_obstacle: oracle_nav_action 
  - /habitat/task/actions@habitat.task.actions.agent_5_oracle_nav_randcoord_action_obstacle: oracle_nav_action 
  - /habitat/task/actions@habitat.task.actions.agent_6_oracle_nav_randcoord_action_obstacle: oracle_nav_action 
  - /habitat/task/lab_sensors@habitat.task.lab_sensors.agent_0_pointgoal_with_gps_compass: pointgoal_with_gps_compass_sensor
  - _self_

habitat:
  dataset:
    split: train
    type: DynamicVLNCE-v1  # 使用DynamicVLNCE数据集类型
    data_path: "/share/home/u14004/dhj/Falcon-main/data/dynamic_dataset_final_v1/train/{scene}.json.gz"
    scenes_dir: "/share/home/u14004/dhj/Falcon-main/data/scene_datasets/hm3d"
    content_scenes: ["*"]
  environment:
    iterator_options:
      shuffle: True  # 启用shuffle，确保随机均匀采样
      cycle: True  # 循环采样，确保能收集所有episode
  gym:
    obs_keys: 
      - agent_0_overhead_front_rgb  # RGB相机用于CLIP处理 (mapped from agent_0 jaw camera)
      - agent_0_overhead_front_depth  # 深度相机用于CLIP处理
      - agent_0_pointgoal_with_gps_compass
      - agent_0_localization_sensor
      - agent_0_human_num_sensor  
      - agent_0_oracle_humanoid_future_trajectory
      - agent_0_falcon_instruction  # 文本指令传感器（从vln_sensors.InstructionSensor读取）
      - agent_0_falcon_gt_action    # 运动真值传感器（从vln_sensors.GT_ActionSensor读取，IL需要）
  task:
    actions:
      agent_0_discrete_stop:
        lin_speed: 0.0 
        ang_speed: 0.0
      agent_0_discrete_move_forward:
        lin_speed: 25.0
        ang_speed: 0.0
        allow_dyn_slide: True
      agent_0_discrete_turn_left:
        lin_speed: 0.0
        ang_speed: 10.0
        allow_dyn_slide: True
      agent_0_discrete_turn_right:
        lin_speed: 0.0
        ang_speed: -10.0
        allow_dyn_slide: True
      agent_1_oracle_nav_randcoord_action_obstacle:
        type: OracleNavRandCoordAction_Obstacle 
        motion_control: human_joints
        lin_speed: 10.0
        ang_speed: 10.0
        allow_dyn_slide: True
      agent_2_oracle_nav_randcoord_action_obstacle:
        type: OracleNavRandCoordAction_Obstacle 
        motion_control: human_joints
        lin_speed: 10.0
        ang_speed: 10.0
        allow_dyn_slide: True
      agent_3_oracle_nav_randcoord_action_obstacle:
        type: OracleNavRandCoordAction_Obstacle 
        motion_control: human_joints
        lin_speed: 10.0
        ang_speed: 10.0
        allow_dyn_slide: True
      agent_4_oracle_nav_randcoord_action_obstacle:
        type: OracleNavRandCoordAction_Obstacle 
        motion_control: human_joints
        lin_speed: 10.0
        ang_speed: 10.0
        allow_dyn_slide: True
      agent_5_oracle_nav_randcoord_action_obstacle:
        type: OracleNavRandCoordAction_Obstacle 
        motion_control: human_joints
        lin_speed: 10.0
        ang_speed: 10.0
        allow_dyn_slide: True
      agent_6_oracle_nav_randcoord_action_obstacle:
        type: OracleNavRandCoordAction_Obstacle 
        motion_control: human_joints
        lin_speed: 10.0
        ang_speed: 10.0
        allow_dyn_slide: True

habitat_baselines:
  evaluate: False
  verbose: True
  trainer_name: "dagger"  # 使用DAgger训练器（第一阶段也使用dagger，但只收集一次数据）
  torch_gpu_id: 0
  tensorboard_dir: "evaluation-vln/dynamic_vlnce_clip_initial_il_v1/hm3d/tb"
  video_dir: "evaluation-vln/dynamic_vlnce_clip_initial_il_v1/hm3d/video"
  test_episode_count: -1
  num_environments: 2  # 并行环境数量 - 减少以降低内存占用
  checkpoint_folder: "evaluation-vln/dynamic_vlnce_clip_initial_il_v1/hm3d/checkpoints"
  num_updates: -1
  total_num_steps: 15000000
  log_interval: 1  # 每个batch都输出日志，便于监控loss
  log_file: "evaluation-vln/dynamic_vlnce_clip_initial_il_v1/hm3d/train.log"
  num_checkpoints: 50  # 定期保存checkpoint的数量
  checkpoint_interval: 10  # 如果num_checkpoints != -1，则使用num_checkpoints；否则使用checkpoint_interval（基于epoch数）
  force_torch_single_threaded: False  # 允许多线程以提高CPU-GPU数据传输效率
  load_resume_state_config: False

  eval:
    use_ckpt_config: False
    should_load_ckpt: True

  # IL (Imitation Learning) 配置
  # 第一阶段：从30k池随机均匀采样10,000个episodes，训练初始策略π₀
  il:
    # 通用IL超参数
    epochs: 4  # 训练4个epoch
    batch_size: 4  # 批次大小 - 减小以降低内存占用
    use_iw: True  # 使用inflection weighting
    inflection_weight_coef: 3.0
    # 数据加载优化参数
    dataloader_num_workers: 0  # 数据加载器工作进程数（0=单进程，避免LMDB多进程问题）
    pin_memory: False  # 单进程时不需要pin_memory
    
    # 分布式训练配置（IL专用，不使用ddppo）
    distributed:
      enabled: False  # 禁用分布式训练，先测试单卡是否能正常运行
      backend: "nccl"  # 分布式后端（nccl用于GPU，gloo用于CPU）
      init_method: "env://"  # 初始化方法（env://表示从环境变量读取）
      world_size: -1  # 总进程数（-1表示从环境变量读取）
      rank: -1  # 当前进程rank（-1表示从环境变量读取）
      local_rank: -1  # 本地rank（-1表示从环境变量读取）
      find_unused_parameters: False  # DDP的find_unused_parameters参数
      broadcast_buffers: True  # DDP的broadcast_buffers参数
      gradient_as_bucket_view: False  # DDP的gradient_as_bucket_view参数
    
    # BaseILTrainer需要的配置项
    eval_save_results: False  # 是否保存评估结果
    log_metrics: False  # 是否记录指标到日志文件
    output_log_dir: "evaluation-vln/dynamic_vlnce_clip_initial_il_v1/hm3d/logs"  # 日志输出目录
    results_dir: "evaluation-vln/dynamic_vlnce_clip_initial_il_v1/hm3d/results/{split}"  # 结果保存目录
    
    # Resume state配置（用于SLURM作业恢复，类似RL训练器）
    save_resume_state_interval: 10  # 每10个epoch保存一次resume state（.habitat-resume-state.pth）
    save_state_batch_only: False  # 是否只在SLURM batch job中保存

    # 多智能体配置（移到IL下）
    agent:
      type: "MultiAgentAccessMgr"
      num_agent_types: 7
      num_active_agents_per_type: [1, 1, 1, 1, 1, 1, 1]
      num_pool_agents_per_type: [1, 1, 1, 1, 1, 1, 1]
      agent_sample_interval: 20
      force_partner_sample_idx: -1

    # 策略配置 - agent_0使用PointNavResNetPolicy（支持CLIP架构）
    # 注意：PointNavResNetPolicy继承自NetPolicy，只包含actor网络，没有critic
    # 适合IL训练使用
    policy:
      agent_0:
        name: "PointNavResNetPolicy"  # 使用与ddppo相同的策略，支持CLIP架构
        action_distribution_type: "categorical"  # 必须显式指定为离散动作分布，否则会报错 

    # 模型和优化器配置
    model:
      hidden_size: 512
      # CLIP架构相关参数 - 需要在dagger_trainer中传递给策略网络
      backbone: resnet50_clip_attnpool  # 使用CLIP架构进行文本-图像特征融合
      rnn_type: LSTM
      num_recurrent_layers: 2
      # 文本指令处理配置
      use_text_instruction: True
      instruction_matching_mode: "episode_based"  # 基于episode的指令匹配
      text_encoder_dim: 2048
      fusion_method: attention
      # 预训练权重配置
      pretrained_weights: /share/home/u14004/dhj/Falcon/pretrained_model/falcon_pretrained_25.pth
      pretrained: True  # 加载其他模块的预训练权重（CLIP视觉编码器权重会被跳过）
      pretrained_encoder: False
      train_encoder: True

    optim:
      lr: 2.5e-4
      eps: 1e-5
      max_grad_norm: 0.2

    # 辅助损失配置 - 已禁用（不希望在IL训练时使用辅助网络）
    # auxiliary_losses:
    #   people_counting:
    #     max_human_num: 6
    #     loss_scale: 0.1
    #   guess_human_position:
    #     max_human_num: 6
    #     position_dim: 2
    #     loss_scale: 0.1
    #   future_trajectory_prediction:
    #     max_human_num: 6
    #     future_step: 4
    #     loss_scale: 0.1

    # DAgger特定配置（第一阶段：只收集一次数据，不使用DAgger迭代）
    # 从30k池随机均匀采样10,000个episodes
    dagger:
      iterations: 1  # 第一阶段只迭代1次（只收集一次数据并训练）
      update_size: 10002  # 从30k池随机均匀采样10,000个episodes
      # 第一阶段使用p=1.0，完全使用专家动作（随机均匀采样）
      p: 1.0  # 第一阶段完全使用专家动作（随机均匀采样）
      force_diverse_episodes: False  # 第一阶段不需要强制收集不同的episode，允许随机采样
      preload_lmdb_features: False  # 是否预加载LMDB特征
      lmdb_features_dir: "/share/home/u14004/dhj/Falcon-main/evaluation-vln/dynamic_vlnce_clip_initial_il_v1/hm3d/lmdb/{split}"
      lmdb_map_size: 120000000000  # 增大LMDB大小以容纳10,000个episode（约20GB）
      lmdb_commit_frequency: 200  # 每200个episode提交一次（减少I/O频率以提高速度）
      lmdb_fp16: False
    dataset_preload_multiplier: 4  # 只缓存1个batch的trajectory，其他数据直接留在磁盘

