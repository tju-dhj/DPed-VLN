  trajectory_line_width: 2
  trajectory_point_size: 5
  robot_color_r: 0
  robot_color_g: 0
  robot_color_b: 255
  human_color_0_r: 255
  human_color_0_g: 0
  human_color_0_b: 0
  human_color_1_r: 0
  human_color_1_g: 255
  human_color_1_b: 0
  human_color_2_r: 255
  human_color_2_g: 165
  human_color_2_b: 0
  human_color_3_r: 255
  human_color_3_g: 0
  human_color_3_b: 255
  human_color_4_r: 0
  human_color_4_g: 255
  human_color_4_b: 255
  human_color_5_r: 255
  human_color_5_g: 255
  human_color_5_b: 0
  goal_color_r: 0
  goal_color_g: 255
