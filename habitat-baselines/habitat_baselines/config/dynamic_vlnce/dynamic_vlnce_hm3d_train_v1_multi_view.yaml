# @package _global_
# 
# 多视角融合训练配置（overhead_front + third）
# 基于 dynamic_vlnce_hm3d_train_v1.yaml，添加第三视角传感器
#

defaults:
  - dynamic_vlnce_hm3d_train_v1
  - _self_

# 覆盖基础配置，添加第三视角传感器
habitat:
  gym:
    obs_keys:
      # RGB and Depth sensors (多视角)
      - agent_0_overhead_front_rgb     # 俯视RGB
      - agent_0_overhead_front_depth   # 俯视Depth
      - agent_0_third_rgb              # 第三视角RGB ⭐ 新增
      - agent_0_third_depth            # 第三视角Depth ⭐ 新增
      
      # Navigation sensors
      - agent_0_pointgoal_with_gps_compass
      - agent_0_localization_sensor
      - agent_0_human_num_sensor
      - agent_0_oracle_humanoid_future_trajectory
      
      # VLN sensors
      - agent_0_falcon_instruction
      - agent_0_falcon_gt_action

habitat_baselines:
  # 由于多视角增加了内存消耗，需要调整训练参数
  num_environments: 2  # 从4减少到2，避免OOM
  
  checkpoint_folder: "evaluation-vln/dynamic_vlnce_clip_rl_v1_multi_view/hm3d/checkpoints"
  tensorboard_dir: "evaluation-vln/dynamic_vlnce_clip_rl_v1_multi_view/hm3d/tb"
  
  rl:
    ppo:
      num_steps: 32  # 从64减少到32，避免OOM
      ppo_epoch: 1
      
    ddppo:
      backbone: resnet50_clip_attnpool
      
      # 预训练权重路径（可选，如果不需要预训练可以注释掉）
      pretrained_weights: /share/home/u14004/dhj/Falcon-main/evaluation-vln/dynamic_vlnce_clip_direct_il_v1/hm3d/checkpoints/ckpt.epoch_5.step_20095.pth
      pretrained: True
      
      # ⭐ CLIP多视角传感器配置
      clip_visual_sensors:
        # RGB传感器列表（按处理顺序）
        rgb_keys:
          - overhead_front_rgb  # 俯视前方RGB
          - third_rgb           # 第三视角RGB ⭐ 启用
        
        # Depth传感器列表（按处理顺序）
        depth_keys:
          - overhead_front_depth  # 俯视前方Depth
          - third_depth           # 第三视角Depth ⭐ 启用
        
        # 多视角融合模式
        # - "average": 特征级平均融合（内存友好，推荐）
        # - "concat": 特征拼接后线性投影（增加参数量）
        # - "attention": 自注意力加权融合（效果最好，但计算量大）
        fusion_mode: "average"
        
        # 融合前是否归一化（推荐True）
        normalize_before_fusion: True

# 说明：
# 1. 本配置在单视角基础上添加了第三视角传感器（third_rgb, third_depth）
# 2. CLIP会同时处理4个传感器：overhead_front_rgb, overhead_front_depth, third_rgb, third_depth
# 3. 使用average模式融合4个视角的特征
# 4. 由于内存消耗增加，建议减少num_environments和num_steps
# 5. 训练速度约为单视角的70%
# 6. 预期性能提升：5-10%（取决于任务和数据集）

